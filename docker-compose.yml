version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: db_558771  # Substituir pelo RM
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dimdim_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: web_558771  # Substituir pelo RM
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: dimdim_db
    depends_on:
      - db

volumes:
  db_data:
